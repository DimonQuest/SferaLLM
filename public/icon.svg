<!-- Placeholder icon.svg - convert to ico/icns/png using online tools -->
<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad)"/>

  <!-- Chat bubbles -->
  <g fill="white" opacity="0.9">
    <!-- Left bubble -->
    <rect x="100" y="180" width="140" height="100" rx="20" />
    <polygon points="100,240 80,260 100,260" />

    <!-- Right bubble -->
    <rect x="270" y="240" width="140" height="100" rx="20" />
    <polygon points="410,300 430,320 410,320" />
  </g>

  <!-- AI symbol -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle">AI</text>
</svg>
